<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>E-Ink Reader</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="controls">
    <input type="text" id="urlInput" placeholder="Paste URL...">
    <button id="loadBtn">Render URL</button>
    <button id="themeToggle">Toggle Dark Mode</button>
    <button id="printBtn">Export to PDF</button>
    <input type="file" id="fileInput" accept=".txt, .md">
</div>
  <iframe id="readerFrame" 
        sandbox="allow-same-origin allow-scripts allow-modals" 
        src="about:blank">
</iframe>
    <script src="app.js"></script>
</body>
</html>
